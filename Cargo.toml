[package]
name = "rs_watson"
description = "Rust clone of tdWatson"
version = "0.1.0"
edition = "2021"
authors = ["Philip Keil <github@pkeil.de>"]
readme = "README.md"
license = "MIT"
repository = "https://github.com/Daedaleus/rs_watson"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Logging
log = "0.4.14"
env_logger = "0.9.0"
# Better Result
anyhow = "1.0.53"
# CLI
structopt = "0.3.26"
# Serialization
serde = { version = "1.0.134", features = ["derive"] }
serde_json = "1.0.76"
# Config
directories-next = "2.0.0"
toml = "0.5.8"
# Date and time stuff
chrono = { version = "0.4.19", features = ["serde"] }